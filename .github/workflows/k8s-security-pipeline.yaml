name: Security pipeline

on:
  workflow_dispatch:                  
    inputs:
      cluster_name:
        description: "Cluster name"
        required: true
        type: string
      mgmt_cluster:
        description: "Apply to Management cluster"
        required: true
        default: false
        type: boolean
      workload_cluster:
        description: "Apply to workload cluster"
        required: true
        default: false
        type: boolean
      apply_cilium:
        description: "Apply Cilium network policy"
        required: true
        default: false
        type: boolean
      apply_Azure_rbac:
        description: "Apply Azure RBAC"
        required: true
        default: false
        type: boolean
      environment:
        type: choice
        description: Environment
        required: true
        options:
          - dev
          - stage
          - prod
        default: dev
      runner_name:
        type: string
        description: Github Runner
        required: true

env:
  ANSIBLE_FORCE_COLOR: "1"
  ANSIBLE_HOST_KEY_CHECKING: "False"

jobs:
  # -------------------------------------------------------
  # JOB 1 - Validate inputs and secrets before doing anything
  # -------------------------------------------------------
  preflight:
    name: Preflight Checks
    runs-on: self-hosted
    outputs:
      proceed: ${{ steps.validate.outputs.proceed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets exist
        id: validate
        run: |
          missing=""
          [ -z "${{ secrets.ETCD_ENCRYPTION_KEY }}" ]    && missing="$missing ETCD_ENCRYPTION_KEY"

          if [ -n "$missing" ]; then
            echo "❌ Missing required secrets:$missing"
            exit 1
          fi

          echo "✅ All required secrets present"
          echo "proceed=true" >> $GITHUB_OUTPUT

      - name: Show run parameters
        run: |
          echo "🖥️ Environment : ${{ github.event.inputs.environment }}"
          echo "🎯 mgmt_cluster   : ${{ github.event.inputs.mgmt_cluster }}"
          echo "🎯 worklaod_cluster  : ${{ github.event.inputs.workload_cluster }}"
          echo "🔍 Cilium        : ${{ github.event.inputs.apply_cilium }}"
          echo "🔍 Azure RBAC    : ${{ github.event.inputs.apply_Azure_rbac }}"
          echo "📡 Runner Name   : ${{ github.event.inputs.runner_name }}"
          echo "🔖 Cluster name  : ${{ github.event.inputs.cluster_name }}"
          echo "👤 Triggered by  : ${{ github.actor }}"
          echo "📅 Run time      : $(date -u)"


  # -------------------------------------------------------
  # JOB 2 - Run Azure RBAC on mgmt cluster
  # -------------------------------------------------------
  mgmt-cluster:
    name: "Run Azure RBAC on mgmt cluster"
    runs-on: self-hosted
    needs: preflight
    if: |
      needs.preflight.outputs.proceed == 'true' &&
      (
        github.event.inputs.mgmt_cluster == 'true'
      )
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get the mgmt cluster inventory
        run: |
          export KUBECONFIG=~/.kube/${{ github.event.inputs.cluster_name }}-m.kubeconfig
          echo "[controlplane]" > /tmp/mgmt-inv
          kubectl get no -o wide | awk '/control-plane/ {print $6}' >> /tmp/mgmt-inv
          echo "[vars]" >>tmp/mgmt-inv
          echo "ansible_user: ${{ secrets.ANSIBLE_USER }}" >> /tmp/mgmt-inv
          echo 'ansible_ssh_common_args: "-o StrictHostKeyChecking=no"'  >> /tmp/mgmt-inv

      - name: Run Azure RBAC 
        run: |
          echo "Reserved"



  # -------------------------------------------------------
  # JOB 3 - Run Hardening on workload cluster 
  # -------------------------------------------------------
  workload-cluster:
    name: "Run hardening on workload cluster"
    runs-on: self-hosted
    needs: preflight
    if: |
      needs.preflight.outputs.proceed == 'true' &&
      (
        github.event.inputs.workload_cluster == 'true'

      )
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get the workload cluster inventory
        run: |
          export KUBECONFIG=~/.kube/${{ github.event.inputs.cluster_name }}-w1.kubeconfig
          echo "[controlplane]" > /tmp/workload-inv
          kubectl get no -o wide | awk '/control-plane/ {print $6}' >> /tmp/workload-inv
          echo "[vars]" >> /tmp/workload-inv
          echo "ansible_user: ${{ secrets.ANSIBLE_USER }}" >> /tmp/workload-inv
          echo 'ansible_ssh_common_args: "-o StrictHostKeyChecking=no"'  >> /tmp/workload-inv

      - name: Write extra vars file
        run: |
          echo "encryption_key: ${{ secrets.ETCD_ENCRYPTION_KEY }}" > /tmp/extra_vars.yml
          chmod 600 /tmp/extra_vars.yml


      - name: Run playbook on all the CP nodes
        id: apply_encryption
        working-directory: ansible
        env:
          ANSIBLE_ROLES_PATH: ./roles
        run: |
          ansible-playbook playbooks/etcd-encryption.yml \
            -i /tmp/workload-inv \
            --extra-vars "@/tmp/extra_vars.yml" \
            -v 
     
      - name: Re-encrypt all the secrets
        if: steps.apply_encryption.outcome == 'success' 
        run: |
          export KUBECONFIG=~/.kube/${{ github.event.inputs.cluster_name }}-w1.kubeconfig
          kubectl get nodes
          kubectl get secrets --all-namespaces -o json  | kubectl replace -f -

      - name: Run Cilium network policy playbook
        working-directory: ansible
        env:
          ANSIBLE_ROLES_PATH: ./roles
        run: |
          cp ~/.kube/${{ github.event.inputs.cluster_name }}-w1.kubeconfig /tmp/kubeconfig
          ansible-playbook playbooks/cilium-network-policy.yml \
          --extra-vars "cluster_name=${{ github.event.inputs.cluster_name }}" \
          -v

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f /tmp/eksa_ssh_key /tmp/extra_vars.yml /tmp/workload-inv /tmp/kubeconfig

