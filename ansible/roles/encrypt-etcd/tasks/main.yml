---
- name: Create encryption config directory
  file:
    path: "{{ enc_config_dir }}"
    state: directory
    mode: '0700'
    owner: root
    group: root

- name: Write EncryptionConfiguration
  template:
    src: encryption-config.yaml.j2
    dest: "{{ enc_config_path }}"
    mode: '0600'
    owner: root
    group: root
  register: enc_config_written

- name: Check if encryption flag already present in apiserver manifest
  command: grep -q "encryption-provider-config" "{{ apiserver_manifest }}"
  register: flag_check
  failed_when: false
  changed_when: false


- name: Patch manifest with correct indentation
  shell: |
    python3 << 'PYEOF'
    with open('/etc/kubernetes/manifests/kube-apiserver.yaml', 'r') as f:
        lines = f.readlines()

    # Detect indentation from existing volumeMount items
    # Find the line "    - mountPath:" to get exact indent used
    existing_mount_indent = ''
    existing_vol_indent = ''
    in_volumemounts = False
    in_volumes = False

    for line in lines:
        if 'volumeMounts:' in line and not in_volumes:
            in_volumemounts = True
            continue
        if in_volumemounts and '- mountPath:' in line:
            existing_mount_indent = line[:line.index('-')]
            in_volumemounts = False
        if line.strip() == 'volumes:':
            in_volumes = True
            continue
        if in_volumes and '- hostPath:' in line:
            existing_vol_indent = line[:line.index('-')]
            in_volumes = False

    print(f"Detected mount indent: '{existing_mount_indent}' ({len(existing_mount_indent)} spaces)")
    print(f"Detected vol indent  : '{existing_vol_indent}' ({len(existing_vol_indent)} spaces)")

    # Build new lines using detected indentation
    mi = existing_mount_indent          # e.g. '    ' (4 spaces)
    mp = mi + '  '                      # property indent e.g. '      ' (6 spaces)
    vi = existing_vol_indent            # e.g. '  ' (2 spaces)
    vp = vi + '  '                      # hostPath property indent
    vpp = vp + '  '                     # path/type indent

    enc_flag     = '    - --encryption-provider-config=/etc/kubernetes/enc/encryption-config.yaml\n'
    mount_lines  = [
        f'{mi}- mountPath: /etc/kubernetes/enc\n',
        f'{mp}name: enc-config\n',
        f'{mp}readOnly: true\n',
    ]
    volume_lines = [
        f'{vi}- hostPath:\n',
        f'{vpp}path: /etc/kubernetes/enc\n',
        f'{vpp}type: DirectoryOrCreate\n',
        f'{vp}name: enc-config\n',
    ]

    new_lines = []
    already_has_flag   = any('encryption-provider-config' in l for l in lines)
    already_has_mount  = any('enc-config' in l for l in lines)
    already_has_volume = any('/etc/kubernetes/enc' in l for l in lines)

    for i, line in enumerate(lines):
        new_lines.append(line)

        # Insert flag after tls-private-key-file
        if not already_has_flag and '--tls-private-key-file' in line:
            new_lines.append(enc_flag)

        # Insert volumeMount after volumeMounts:
        if not already_has_mount and 'volumeMounts:' in line:
            new_lines.extend(mount_lines)

        # Insert volume after volumes:
        if not already_has_volume and line.strip() == 'volumes:':
            new_lines.extend(volume_lines)

    with open('/etc/kubernetes/manifests/kube-apiserver.yaml', 'w') as f:
        f.writelines(new_lines)

    print("Done")
    PYEOF
  register: patch_result
  when: flag_check.rc != 0

- name: Show patch result
  debug:
    var: patch_result.stdout_lines
  when: flag_check.rc != 0


- name: Validate patched manifest is valid YAML
  shell: |
    python3 -c "
    import yaml
    with open('{{ apiserver_manifest }}') as f:
        yaml.safe_load(f)
    print('YAML_VALID')
    "
  register: yaml_check
  when: flag_check.rc != 0

- name: Abort — restore backup if YAML is invalid
  block:
    - name: Find latest backup
      shell: ls -t /etc/kubernetes/manifests/kube-apiserver.yaml.bak.* | head -1
      register: latest_backup

    - name: Restore backup
      copy:
        src: "{{ latest_backup.stdout }}"
        dest: "{{ apiserver_manifest }}"
        remote_src: true

    - name: Fail with message
      fail:
        msg: "Manifest YAML invalid after patching — restored from {{ latest_backup.stdout }}"
  when:
    - flag_check.rc != 0
    - "'YAML_VALID' not in yaml_check.stdout"

- name: Wait for kube-apiserver to restart (kubelet detects manifest change)
  wait_for:
    port: 6443
    delay: 15
    timeout: 120
  when: patch_output.changed or enc_config_written.changed

- name: Verify kube-apiserver is healthy
  uri:
    url: "https://{{ ansible_host }}:6443/healthz"
    validate_certs: false
    status_code: 200
  register: health_check
  retries: 10
  delay: 6
  until: health_check.status == 200
  run_once: true

