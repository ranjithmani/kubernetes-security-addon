---
- name: Create encryption config directory
  file:
    path: "{{ enc_config_dir }}"
    state: directory
    mode: '0700'
    owner: root
    group: root

- name: Write EncryptionConfiguration
  template:
    src: encryption-config.yaml.j2
    dest: "{{ enc_config_path }}"
    mode: '0600'
    owner: root
    group: root
  register: enc_config_written

- name: Check if encryption flag already present in apiserver manifest
  command: grep -q "encryption-provider-config" "{{ apiserver_manifest }}"
  register: flag_check
  failed_when: false
  changed_when: false

- name: Patch manifest with Python string operations (no YAML parsing)
  shell: |
    python3 << 'PYEOF'
    import re
    with open('/etc/kubernetes/manifests/kube-apiserver.yaml', 'r') as f:
        lines = f.readlines()
    new_lines = []
    for i, line in enumerate(lines):
        new_lines.append(line)
        # 1. Add encryption flag after tls-private-key-file
        if '--tls-private-key-file' in line and '--encryption-provider-config' not in lines[i+1]:
            indent = len(line) - len(line.lstrip())
            new_lines.append(' ' * indent + '- --encryption-provider-config=/etc/kubernetes/enc/encryption-config.yaml\n')
        # 2. Add volumeMount after volumeMounts: line
        if line.strip() == 'volumeMounts:' and i+1 < len(lines) and 'enc-config' not in ''.join(lines[i:i+5]):
            indent = len(line) - len(line.lstrip())
            new_lines.append(' ' * (indent + 2) + '- mountPath: /etc/kubernetes/enc\n')
            new_lines.append(' ' * (indent + 4) + 'name: enc-config\n')
            new_lines.append(' ' * (indent + 4) + 'readOnly: true\n')
        # 3. Add volume after volumes: line
        if line.strip() == 'volumes:' and i+1 < len(lines) and '/etc/kubernetes/enc' not in ''.join(lines[i:i+5]):
            indent = len(line) - len(line.lstrip())
            new_lines.append(' ' * (indent + 2) + '- hostPath:\n')
            new_lines.append(' ' * (indent + 6) + 'path: /etc/kubernetes/enc\n')
            new_lines.append(' ' * (indent + 6) + 'type: DirectoryOrCreate\n')
            new_lines.append(' ' * (indent + 4) + 'name: enc-config\n')

    with open('/etc/kubernetes/manifests/kube-apiserver.yaml', 'w') as f:
        f.writelines(new_lines)

    print("Patched successfully")
    PYEOF
  register: patch_result
  when: flag_check.rc != 0

- name: Show patch result
  debug:
    var: patch_result.stdout_lines
  when: flag_check.rc != 0


- name: Validate patched manifest is valid YAML
  shell: |
    python3 -c "
    import yaml
    with open('{{ apiserver_manifest }}') as f:
        yaml.safe_load(f)
    print('YAML_VALID')
    "
  register: yaml_check
  when: flag_check.rc != 0

- name: Abort — restore backup if YAML is invalid
  block:
    - name: Find latest backup
      shell: ls -t /etc/kubernetes/manifests/kube-apiserver.yaml.bak.* | head -1
      register: latest_backup

    - name: Restore backup
      copy:
        src: "{{ latest_backup.stdout }}"
        dest: "{{ apiserver_manifest }}"
        remote_src: true

    - name: Fail with message
      fail:
        msg: "Manifest YAML invalid after patching — restored from {{ latest_backup.stdout }}"
  when:
    - flag_check.rc != 0
    - "'YAML_VALID' not in yaml_check.stdout"

- name: Wait for kube-apiserver to restart (kubelet detects manifest change)
  wait_for:
    port: 6443
    delay: 15
    timeout: 120
  when: patch_output.changed or enc_config_written.changed

- name: Verify kube-apiserver is healthy
  uri:
    url: "https://{{ ansible_host }}:6443/healthz"
    validate_certs: false
    status_code: 200
  register: health_check
  retries: 10
  delay: 6
  until: health_check.status == 200
  run_once: true

